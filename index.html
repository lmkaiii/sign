<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGCA 導師文件填寫系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', system-ui, sans-serif; 
            margin: 0;
            background: #f8fafc;
        }
        .hidden { display: none !important; }
        
        /* 自訂樣式（取代 Tailwind） */
        .btn-blue {
            background: #2563eb;
            color: white;
            padding: 16px 40px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-blue:hover { background: #1e40af; }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .overlay {
            position: absolute;
            background: rgba(255,255,255,0.95);
            border: 2px solid #2563eb;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        #signature-canvas {
            border: 2px dashed #2563eb;
            background: white;
            cursor: crosshair;
            touch-action: none;
        }
        
        .pdf-viewer {
            width: 100%;
            height: 75vh;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            background: #f8fafc;
        }
        
        .step-dot {
            width: 28px; height: 28px;
            background: #dbeafe;
            color: #2563eb;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 密碼畫面 -->
    <div id="password-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-700">
        <div class="card p-10 max-w-md w-full mx-4 text-center">
            <h1 class="text-3xl font-bold text-gray-800">香港小童群益會</h1>
            <p class="text-blue-600 font-medium mt-2">導師文件確認系統</p>
            
            <div class="mt-8 space-y-6">
                <input id="password-input" type="password" 
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg focus:outline-none focus:border-blue-500"
                       placeholder="輸入密碼">
                <button onclick="checkPassword()" 
                        class="btn-blue w-full text-lg">進入系統</button>
            </div>
        </div>
    </div>

    <!-- 主系統 -->
    <div id="main-app" class="hidden min-h-screen">
        <!-- 頂部導航 -->
        <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 text-white px-5 py-2 rounded-2xl font-bold text-xl">BGCA</div>
                    <div>
                        <h1 class="text-2xl font-bold">導師文件填寫系統</h1>
                    </div>
                </div>
                <div class="flex gap-8">
                    <div onclick="goToStep(1)" id="step-dot-1" class="cursor-pointer flex items-center gap-3 text-blue-600 font-medium">
                        <div class="step-dot">1</div> 政策文件
                    </div>
                    <div onclick="goToStep(2)" id="step-dot-2" class="cursor-pointer flex items-center gap-3 text-blue-600 font-medium">
                        <div class="step-dot">2</div> 行為守則
                    </div>
                    <div onclick="goToStep(3)" id="step-dot-3" class="cursor-pointer flex items-center gap-3 text-blue-600 font-medium">
                        <div class="step-dot">3</div> 簽署確認
                    </div>
                </div>
                <button onclick="logout()" class="text-red-500 hover:text-red-600">登出</button>
            </div>
        </nav>

        <!-- 步驟 1 -->
        <div id="step-1" class="max-w-6xl mx-auto px-6 py-8">
            <h2 class="text-3xl font-bold flex items-center gap-4 mb-6">
                <span class="bg-blue-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center text-2xl">1</span>
                《守護兒童及青少年政策》 (1.pdf)
            </h2>
            <iframe src="1.pdf" class="pdf-viewer"></iframe>
            <div class="text-right mt-8">
                <button onclick="nextStep(1)" class="btn-blue">下一步 → 行為守則</button>
            </div>
        </div>

        <!-- 步驟 2 -->
        <div id="step-2" class="max-w-6xl mx-auto px-6 py-8 hidden">
            <h2 class="text-3xl font-bold flex items-center gap-4 mb-6">
                <span class="bg-blue-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center text-2xl">2</span>
                《僱員行為守則》 (2.pdf)
            </h2>
            <iframe src="2.pdf" class="pdf-viewer"></iframe>
            <div class="text-right mt-8">
                <button onclick="nextStep(2)" class="btn-blue">下一步 → 簽署確認</button>
            </div>
        </div>

        <!-- 步驟 3：簽署 -->
        <div id="step-3" class="max-w-6xl mx-auto px-6 py-8 hidden">
            <h2 class="text-3xl font-bold flex items-center gap-4 mb-6">
                <span class="bg-blue-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center text-2xl">3</span>
                簽署確認表 (image004.png)
            </h2>

            <div id="form-container" class="relative max-w-[820px] mx-auto bg-white rounded-3xl overflow-hidden shadow-2xl">
                <img id="form-image" src="image004.png" alt="確認表格" class="w-full">
                
                <!-- 英文姓名 -->
                <div class="overlay" style="top: 68%; left: 12%; width: 38%;">
                    <input id="english-name" type="text" placeholder="English Name (e.g. John Chan)"
                           class="w-full px-5 py-4 text-lg border-0 focus:outline-none font-medium">
                </div>
                
                <!-- 日期 -->
                <div class="overlay" style="top: 68%; left: 58%; width: 28%;">
                    <input id="sign-date" type="text" readonly class="w-full px-5 py-4 text-lg border-0 bg-transparent text-center font-medium">
                </div>
                
                <!-- 電子簽名 -->
                <div class="overlay" style="top: 78%; left: 12%; width: 48%; padding: 16px;">
                    <p class="text-sm text-gray-600 mb-3">電子簽名（滑鼠或手指繪寫）</p>
                    <canvas id="signature-canvas" width="380" height="140" class="rounded-2xl"></canvas>
                    <div class="flex gap-3 mt-4">
                        <button onclick="clearSignature()" class="flex-1 bg-gray-200 py-3 rounded-2xl text-sm">清除簽名</button>
                        <button onclick="undoSignature()" class="flex-1 bg-gray-200 py-3 rounded-2xl text-sm">上一步</button>
                    </div>
                </div>
            </div>

            <div class="flex justify-center gap-6 mt-12">
                <button onclick="prevStep(3)" class="px-10 py-4 border border-gray-300 rounded-2xl">← 上一步</button>
                <button onclick="generatePDF()" 
                        class="px-14 py-4 bg-green-600 hover:bg-green-700 text-white text-lg rounded-2xl flex items-center gap-3">
                    提交並生成 PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        // 密碼
        function checkPassword() {
            if (document.getElementById('password-input').value === 'bgcafanling') {
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                goToStep(1);
            } else {
                alert('密碼錯誤！請輸入 bgcafanling');
            }
        }

        // 步驟切換
        function goToStep(n) {
            document.querySelectorAll('#step-1, #step-2, #step-3').forEach(s => s.classList.add('hidden'));
            document.getElementById(`step-${n}`).classList.remove('hidden');
        }
        function nextStep(n) { n === 1 ? goToStep(2) : goToStep(3); }
        function prevStep() { goToStep(2); }
        function logout() { if(confirm('確定登出？')) location.reload(); }

        // 電子簽名
        let canvas, ctx, isDrawing = false, lastX, lastY, history = [];
        function initSignature() {
            canvas = document.getElementById('signature-canvas');
            ctx = canvas.getContext('2d');
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e40af';

            canvas.addEventListener('mousedown', e => { isDrawing=true; lastX=e.offsetX; lastY=e.offsetY; history.push(ctx.getImageData(0,0,canvas.width,canvas.height)); });
            canvas.addEventListener('mousemove', e => {
                if(!isDrawing) return;
                ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke();
                lastX = e.offsetX; lastY = e.offsetY;
            });
            canvas.addEventListener('mouseup', () => { isDrawing=false; history.push(ctx.getImageData(0,0,canvas.width,canvas.height)); });
            
            // 觸控支援
            canvas.addEventListener('touchstart', e=>{ e.preventDefault(); isDrawing=true; const r=canvas.getBoundingClientRect(); lastX=e.touches[0].clientX-r.left; lastY=e.touches[0].clientY-r.top; });
            canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(!isDrawing) return; const r=canvas.getBoundingClientRect(); const x=e.touches[0].clientX-r.left; const y=e.touches[0].clientY-r.top; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); lastX=x; lastY=y; });
        }
        function clearSignature(){ ctx.clearRect(0,0,canvas.width,canvas.height); history=[]; }
        function undoSignature(){ if(history.length>1){ history.pop(); ctx.putImageData(history[history.length-1],0,0); } }

        // PDF 生成
        async function generatePDF() {
            const name = document.getElementById('english-name').value.trim();
            if(!name){ alert('請填寫英文姓名'); return; }
            if(ctx.getImageData(0,0,canvas.width,canvas.height).data.every(v=>v===0)){ alert('請繪寫電子簽名'); return; }

            const container = document.getElementById('form-container');
            const canvasImg = await html2canvas(container, {scale:2});
            const imgData = canvasImg.toDataURL('image/png');

            const {jsPDF} = window.jspdf;
            const pdf = new jsPDF('portrait','mm','a4');
            const ratio = Math.min(210/canvasImg.width, 297/canvasImg.height);
            pdf.addImage(imgData, 'PNG', (210 - canvasImg.width*ratio)/2, (297 - canvasImg.height*ratio)/2, canvasImg.width*ratio, canvasImg.height*ratio);
            
            pdf.save(`BGCA_確認表_${name.replace(/[^a-zA-Z0-9]/g,'_')}_${document.getElementById('sign-date').value}.pdf`);
            alert('✅ PDF 已成功下載！');
        }

        // 日期
        function setDate() {
            const d = new Date();
            document.getElementById('sign-date').value = `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
        }

        window.onload = () => {
            initSignature();
            setDate();
        };
    </script>
</body>
</html>
